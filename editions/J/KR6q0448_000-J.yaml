body:
  text: 序禪宗至今日濫觴極矣得一橛之見者輒詡詡自矜冒名祖位抹煞宗旨埋沒古人以欺當世予致慨者久之聚雲吹萬大師中興大慧力究五宗發於言為灌頂醍醐著於書為渡迷寶筏昧者猶謂宗貴一家言而不觀乎吾儒明一經者孰若博通五經之謂大儒耶昔有稱楚石為妙喜後一人如聚雲之作略超群絕倫即起楚石而問之似亦願避三舍誠明興以來禪宗僅見之一人爾惟是韜光晦跡居於巫峽錦江之隈不因人熱以務衒鬻故圓寂數年而語錄猶未全刻更有別錄數十種計近百卷皆發明三代之奧以旁抉諸子百家即吾儒皓首窮經尚不能闖其廊廡豈今之粑脫禪所敢望而伍者哉予與同盟醉心此道仰止高山因謀諸剞劂以行於世噫予未得為聚雲徒也予私淑諸人也天下人未必皆以耳視能具擇法眼者諒不以予言為謬矣崇禎壬午菊月水部尚書郎前榷荊使者廬山千丈巖頭陀熊汝學燈炤稽首敬識聚雲吹萬真禪師語錄目次卷上上堂茶話卷中普說小參示眾法語卷下入堂入室勘辯問答頌古雜述塔銘另刻正錄十卷廣錄三十種共六十六卷板存忠州治平禪院目畢
